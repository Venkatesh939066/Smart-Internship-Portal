<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="120" height="120" rx="30" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>

  <circle cx="60" cy="60" r="35" fill="url(#glowGrad)" opacity="0.15" filter="url(#glow)"/>

  <!-- Career stairs/bars representation -->
  <rect x="32" y="70" width="12" height="20" rx="4" fill="url(#mainGrad)"/>
  <rect x="48" y="52" width="12" height="38" rx="4" fill="url(#mainGrad)"/>
  <rect x="64" y="34" width="12" height="56" rx="4" fill="url(#mainGrad)"/>

  <!-- Swoosh/arrow showing the career growth line -->
  <path d="M 32 80 C 45 60, 65 30, 88 24 C 82 34, 76 52, 76 70" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Success star -->
  <path d="M 88 18 L 91 24 L 98 25 L 93 30 L 94 36 L 88 33 L 82 36 L 83 30 L 78 25 L 85 24 Z" fill="#FBBF24" filter="url(#glow)"/>
</svg>
